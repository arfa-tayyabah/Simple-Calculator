<!DOCTYPE html>
<html lang="en">
    <head>
    <meta name="viewport" content="width= device-width, initial-scale = 1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly value = "0">
        <div class="buttons">
            <button class="brackets" onclick="get_input('(')">(</button>
            <button class="brackets" onclick="get_input(')')">)</button>
            <button class="backspace" onclick="backspace()">⌫</button>
            <button class="clear" onclick="ClearAll()">C</button> 
            <button class="number" onclick="get_input('7')">7</button>
            <button class="number" onclick="get_input('8')">8</button>
            <button class="number" onclick="get_input('9')">9</button>
            <button class="operator" onclick="get_input('*')">x</button>
            <button class="number" onclick="get_input('4')">4</button>
            <button class="number" onclick="get_input('5')">5</button>
            <button class="number" onclick="get_input('6')">6</button>
            <button class="operator" onclick="get_input('-')">-</button>
            <button class="number" onclick="get_input('1')">1</button>
            <button class="number" onclick="get_input('2')">2</button>
            <button class="number" onclick="get_input('3')">3</button>
            <button class="operator" onclick="get_input('+')">+</button>
            <button class="number" onclick="get_input('0')">0</button>
            <button class="operator" onclick="get_input('.')">.</button>
            <button class="operator" onclick="get_input('/')">/</button>
            <button class="operator" onclick="calculate()">=</button>   
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
